name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        run: python -m unittest discover -s backend/tests -v

  backend-smoke:
    name: Backend Smoke Extract API
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend server
        env:
          BACKEND_PORT: "5050"
        run: |
          cd backend
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 5050 > /tmp/lokbhasha-backend.log 2>&1 &
          sleep 4

      - name: Health check
        run: |
          curl -sSf http://127.0.0.1:5050/health > /tmp/health.json
          python -c "import json; data=json.load(open('/tmp/health.json')); assert data.get('status') == 'ok'"

      - name: Extract endpoint validation check
        run: |
          STATUS=$(curl -sS -o /tmp/extract.json -w "%{http_code}" -X POST http://127.0.0.1:5050/extract \
            -F "file=@README.md;type=text/plain")
          python -c "import json; status='''$STATUS'''; data=json.load(open('/tmp/extract.json')); assert status == '400', status; assert 'Only PDF uploads are supported' in data.get('detail', '')"

  analyze:
    name: Analyze Service Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: analyze/package-lock.json

      - name: Install analyze dependencies
        working-directory: analyze
        run: npm ci

      - name: Run analyze tests
        working-directory: analyze
        run: npm test

      - name: Verify glossary artifact
        working-directory: analyze
        run: npm run verify:glossary

      - name: Type-check analyze service
        working-directory: analyze
        run: npm run check

  frontend:
    name: Frontend Tests And Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
