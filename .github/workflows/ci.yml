name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        run: python -m unittest backend.tests.test_pipeline backend.tests.test_api_contract -v

  backend-smoke:
    name: Backend Smoke API
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend server
        env:
          LINGO_DEV_USE_MOCK: "true"
          BACKEND_PORT: "5050"
        run: |
          cd backend
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 5050 > /tmp/lokbhasha-backend.log 2>&1 &
          sleep 4

      - name: Health check
        run: |
          curl -sSf http://127.0.0.1:5050/health > /tmp/health.json
          python -c "import json; data=json.load(open('/tmp/health.json')); assert data.get('status') == 'ok'"

      - name: Translate contract check
        run: |
          curl -sSf -X POST http://127.0.0.1:5050/translate \
            -H "Content-Type: application/json" \
            -d '{"marathi_text":"sample text"}' > /tmp/translate.json
          python -c "import json; data=json.load(open('/tmp/translate.json')); required=['marathi','english','simplified','actions','glossary_terms']; missing=[k for k in required if k not in data]; assert not missing, missing"

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
