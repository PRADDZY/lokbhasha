name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-api:
    name: Deploy Cloudflare API
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Cloudflare API dependencies
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        working-directory: cloudflare-api
        run: npm ci

      - name: Build D1 glossary seed
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        working-directory: cloudflare-api
        run: npm run build:d1

      - name: Apply D1 glossary seed
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        working-directory: cloudflare-api
        run: npx wrangler d1 execute GLOSSARY_DB --remote --file migrations/0001_glossary.sql

      - name: Deploy Cloudflare Worker API
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        working-directory: cloudflare-api
        run: npx wrangler deploy

      - name: Skip Cloudflare API deploy (missing secrets)
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "Skipping Cloudflare API deploy because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not set."

  deploy-frontend:
    name: Deploy Cloudflare Pages Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PAGES_PROJECT_NAME != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PAGES_PROJECT_NAME != '' }}
        working-directory: frontend
        run: npm ci

      - name: Build static frontend
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PAGES_PROJECT_NAME != '' }}
        working-directory: frontend
        run: npm run build

      - name: Deploy Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_PAGES_PROJECT_NAME != '' }}
        working-directory: frontend
        run: npx wrangler pages deploy out --project-name "${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}"

      - name: Skip Cloudflare Pages deploy (missing secrets)
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_PAGES_PROJECT_NAME == '' }}
        run: echo "Skipping Cloudflare Pages deploy because required Cloudflare secrets are not set."

  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-frontend]
    if: always()

    steps:
      - name: Print deployment summary
        run: |
          echo "Cloudflare API deploy job: ${{ needs.deploy-api.result }}"
          echo "Cloudflare Pages deploy job: ${{ needs.deploy-frontend.result }}"
